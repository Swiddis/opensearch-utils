# Locust PPL Load Test Configuration

[database]
# Path to SQLite database for storing response times
file = "query_response_times.db"
# Batch size for writing records (higher = fewer writes, more memory)
batch_size = 100
# Flush interval in seconds (records are written when batch is full OR interval elapses)
flush_interval = 1.0

[calcite]
# Whether Calcite should be enabled in the cluster
enabled = true
# If true, will update the cluster setting; if false, will only check and fail if mismatch
enforce = true

[tests]
# Directory containing PPL query files
ppl_directory = "ppl-patterns"
# Patterns to exclude from test execution (queries containing these strings will be skipped)
exclude_patterns = ["range_auto_date", "headless"]

[run_tracking]
# How to track run IDs: "database" (recommended) or "file"
# - "database": Stores run metadata in the database with start/end times
# - "file": Legacy mode that appends to run_ids.txt
method = "database"
# Only used if method = "file"
file = "run_ids.txt"

[otel]
# Enable OpenTelemetry distributed tracing and metrics
enabled = false
# Directory for OTEL output files (NDJSON format)
output_dir = "otel_output"
# Service metadata
service_name = "locust-ppl-load-test"
service_version = "0.1.0"
# Auto-instrument httpx for HTTP-level spans
instrument_httpx = true

[otel.metrics]
# Enable metrics collection
enabled = true
# Collection interval in seconds
interval = 5.0
# Collect thread pool statistics (active, queue, rejected)
collect_thread_pools = true
# Collect JVM metrics (heap memory)
collect_jvm = true
# Collect OS metrics (CPU, memory, disk)
collect_os = true
